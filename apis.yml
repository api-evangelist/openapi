name: OpenAPI
description: OpenAPI (formerly Swagger Specification) is a standard, language-agnostic
  specification for describing RESTful APIs in a machine-readable format. It enables
  automated documentation generation, client code generation, and API testing, serving
  as a contract between API providers and consumers.
url: https://www.openapis.org/
tags:
- API
- Specification
- REST
- Documentation
created: '2025'
modified: '2025'
apis:
- name: OpenAPI Specification
  description: The OpenAPI Specification (OAS) defines a standard, programming language-agnostic
    interface description for HTTP APIs. Version 3.1.0 aligns with JSON Schema draft
    2020-12, enabling full JSON Schema support for describing request and response
    bodies.
  humanURL: https://spec.openapis.org/oas/latest.html
  baseURL: https://spec.openapis.org/oas/3.1
  properties:
  - type: Documentation
    url: https://spec.openapis.org/oas/v3.1.0
  - type: GitHubRepository
    url: https://github.com/OAI/OpenAPI-Specification
  - type: JsonSchema
    url: json-schema/openapi-document.json
  - type: JsonLdContext
    url: json-ld/openapi-context.jsonld
  tags:
  - OpenAPI
  - REST
  - API Description
  - JSON Schema
